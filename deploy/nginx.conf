# /etc/nginx/sites-available/cercu
server {
    listen 80;
    server_name tudominio.com www.tudominio.com;

    # Redirect HTTP → HTTPS (descomentar después de configurar SSL)
    # return 301 https://$server_name$request_uri;

    # ── Backend API ──
    location /api/ {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Uploads — subir límite si necesitas fotos grandes
        client_max_body_size 10M;
    }

    # ── Archivos subidos (uploads estáticos) ──
    location /uploads/ {
        alias /var/www/cercu-backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Frontend (Nuxt SSR) ──
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── Observatorio de Techos Verdes (temporal) ──
server {
    listen 80;
    server_name observatorio.cercu.com.mx;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

